<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>தண்ணீர் 2099 - குறும்படம்</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background-color: #111;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #222;
      padding: 1rem;
      text-align: center;
      font-size: 1.2rem;
    }

    .container {
      flex: 1;
      position: relative;
    }

    iframe {
      border: none;
      width: 100%;
      height: 100%;
    }

    .fullscreen-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #444;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 5px;
    }

    .fullscreen-btn:hover {
      background: #666;
    }
  </style>
</head>
<body>
  <header>
    தண்ணீர் 2099 - குறும்படம் 
  </header>

  <div class="container" id="embedContainer">
    <iframe id="driveFrame"
      src="https://drive.google.com/file/d/1aEtQ-T2iH3sIt283qdrt-C95cmL9RJ2N/preview"
      allow="autoplay">
    </iframe>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">முழுத் திரை</button>
  </div>

  <script>
    function toggleFullscreen() {
      const elem = document.getElementById("embedContainer");
      if (!document.fullscreenElement) {
        elem.requestFullscreen().catch(err => {
          alert(`Error attempting full-screen: ${err.message}`);
        });
      } else {
        document.exitFullscreen();
      }
    }
  </script>
</body>
</html>
