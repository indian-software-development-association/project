<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offline Recovery Studio</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:Arial}
#lock{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#111}
#app{display:none;padding:20px}
.card{background:#1e1e1e;padding:15px;border-radius:10px;margin:10px 0}
video{width:100%;max-height:60vh;background:#000}
input,button{padding:10px}
</style>
</head>
<body>
<div id="lock">
<h1>Offline Recovery Studio</h1>
<input id="pw" type="password" placeholder="Password">
<button onclick="unlock()">Unlock</button>
</div>

<div id="app">
<div class="card">
<input type="file" id="file">
<p id="info">No file selected</p>
<p id="result">Ready</p>
</div>

<div class="card">
<video id="player" controls></video>
</div>

<div class="card">
<input id="newname" placeholder="recovered-video.mp4">
<button id="save">Save Copy</button>
</div>
</div>

<script>
function unlock(){
 if(document.getElementById('pw').value==='HPK'){
   document.getElementById('lock').style.display='none';
   document.getElementById('app').style.display='block';
 }
}

let currentFile=null;

document.getElementById('file').onchange=async e=>{
 currentFile=e.target.files[0];
 if(!currentFile) return;

 document.getElementById('info').innerHTML =
  currentFile.name + " | " +
  (currentFile.size/1024/1024).toFixed(2) + " MB";

 const buf = await currentFile.slice(0,64).arrayBuffer();
 const b = new Uint8Array(buf);

 let ext='mp4';
 let type='Unknown';

 if(String.fromCharCode(...b.slice(4,8))==='ftyp'){type='MP4/MOV';ext='mp4';}
 else if(String.fromCharCode(...b.slice(0,4))==='RIFF'){type='AVI';ext='avi';}
 else if(String.fromCharCode(...b.slice(0,3))==='FLV'){type='FLV';ext='flv';}
 else if(String.fromCharCode(...b.slice(0,4))==='OggS'){type='OGG';ext='ogg';}

 document.getElementById('result').textContent =
  'Detected: '+type+' | Suggested: .'+ext;

 document.getElementById('newname').value =
  'recovered-video.'+ext;

 document.getElementById('player').src =
  URL.createObjectURL(currentFile);
};

document.getElementById('save').onclick=()=>{
 if(!currentFile) return;

 const name=document.getElementById('newname').value.trim();
 const f=new File([currentFile],name,{type:currentFile.type});

 const a=document.createElement('a');
 a.href=URL.createObjectURL(f);
 a.download=name;
 a.click();
};
</script>
</body>
</html> by Vishal K
