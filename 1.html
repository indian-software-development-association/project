<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentation Viewer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

.slide{
    display:none;
    width:100vw;
    height:100vh;
}

.slide.active{
    display:flex;
    justify-content:center;
    align-items:center;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
}

.controls{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:15px;
    z-index:1000;
}

button{
    padding:12px 24px;
    border:none;
    border-radius:10px;
    background:#2196F3;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1976D2;
}

.slide-number{
    position:fixed;
    top:15px;
    right:15px;
    color:white;
    background:rgba(0,0,0,0.7);
    padding:10px 15px;
    border-radius:8px;
    z-index:1000;
}
</style>
</head>
<body>

<div class="slide-number">
    <span id="counter">1 / 3</span>
</div>

<!-- Slide 1 -->
<div class="slide active">
    <iframe
    src="https://www.youtube.com/embed/T8Mam6h_JY8"
    allowfullscreen>
    </iframe>
</div>

<!-- Slide 2 -->
<div class="slide">
    <iframe
    src="https://www.youtube.com/embed/OQOY6ZkvZTs"
    allowfullscreen>
    </iframe>
</div>

<!-- Slide 3 -->
<div class="slide">
    <img src="https://indian-tech-developers-association.github.io/Browse/Phy.jpeg"
         alt="Physics">
</div>

<div class="controls">
    <button onclick="prevSlide()">◀ Previous</button>
    <button onclick="toggleFullscreen()">⛶ Full Screen</button>
    <button onclick="nextSlide()">Next ▶</button>
</div>

<script>
const slides = document.querySelectorAll('.slide');
const counter = document.getElementById('counter');

let current = 0;

function showSlide(index){
    slides.forEach(slide => slide.classList.remove('active'));

    current = (index + slides.length) % slides.length;

    slides[current].classList.add('active');

    counter.textContent = `${current+1} / ${slides.length}`;
}

function nextSlide(){
    showSlide(current + 1);
}

function prevSlide(){
    showSlide(current - 1);
}

function toggleFullscreen(){
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    }else{
        document.exitFullscreen();
    }
}

document.addEventListener('keydown',(e)=>{
    if(e.key==="ArrowRight"){
        nextSlide();
    }
    if(e.key==="ArrowLeft"){
        prevSlide();
    }
    if(e.key==="f"){
        toggleFullscreen();
    }
});
</script>

</body>
</html>
